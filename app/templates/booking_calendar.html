{% extends "base.html" %}
{% block content %}
<section class="relative overflow-hidden rounded-[2rem] border border-sky-100 bg-gradient-to-br from-white via-sky-50 to-slate-50 shadow-sm">
  <div class="absolute inset-y-0 right-0 hidden w-1/3 bg-[radial-gradient(circle_at_top,rgba(14,165,233,0.16),transparent_58%)] lg:block"></div>
  <div class="relative px-6 py-8 md:px-8">
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div>
        <div class="inline-flex items-center gap-2 rounded-full border border-sky-200 bg-white/80 px-3 py-1 text-xs font-medium uppercase tracking-[0.2em] text-sky-700">
          Calendar View
        </div>
        <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-900 md:text-4xl">Booking calendar</h1>
        <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-600">
          Browse bookings across the month and open a clean popup with the most useful booking details.
        </p>
      </div>
      <a class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-sky-700" href="{{ url_for('routes.admin_bookings') }}">
        Table view
      </a>
    </div>
  </div>
</section>

<section class="mt-6 rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm md:p-8">
  <div id="booking-calendar"></div>
</section>

<div id="calendar-booking-popup" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-slate-950/45" data-popup-close></div>
  <div class="absolute left-1/2 top-1/2 w-[calc(100%-2rem)] max-w-[24rem] -translate-x-1/2 -translate-y-1/2 rounded-[1.75rem] border border-slate-200 bg-white p-5 shadow-2xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <div id="calendar-popup-ref" class="text-xs font-medium uppercase tracking-[0.2em] text-slate-400"></div>
        <h3 id="calendar-popup-title" class="mt-2 text-xl font-semibold text-slate-900"></h3>
        <div id="calendar-popup-status" class="mt-2"></div>
      </div>
      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 text-slate-500 transition hover:bg-slate-50 hover:text-slate-800"
        data-popup-close
      >
        x
      </button>
    </div>

    <div class="mt-5 grid gap-3 text-sm text-slate-600">
      <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
        <div class="text-xs font-medium uppercase tracking-[0.18em] text-slate-400">Total</div>
        <div id="calendar-popup-price" class="mt-1 text-lg font-semibold text-slate-900"></div>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
        <div class="text-xs font-medium uppercase tracking-[0.18em] text-slate-400">Tent</div>
        <div id="calendar-popup-tent" class="mt-1 font-medium text-slate-900"></div>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
        <div class="text-xs font-medium uppercase tracking-[0.18em] text-slate-400">Extras</div>
        <div id="calendar-popup-extras" class="mt-1 font-medium text-slate-900"></div>
      </div>
    </div>

    <div class="mt-5 flex flex-wrap gap-3">
      <a id="calendar-popup-open" class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-sky-700" href="#">
        Open booking
      </a>
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        data-popup-close
      >
        Close
      </button>
    </div>
  </div>
</div>

<style>
  #booking-calendar .fc .fc-event {
    border: 0;
    background: transparent;
    box-shadow: none;
  }

  #booking-calendar .fc .fc-daygrid-event-harness {
    margin-top: 0.25rem;
  }

  #booking-calendar .fc-h-event {
    background: transparent !important;
    border: 0 !important;
  }

  #booking-calendar .fc-daygrid-block-event {
    background: transparent !important;
    border: 0 !important;
  }

  #booking-calendar .fc-event-main {
    padding: 0;
    background: transparent;
  }

  #booking-calendar .fc-daygrid-day-frame {
    min-height: 7.5rem;
  }

  .booking-event-chip {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    width: 100%;
    border: 0;
    border-radius: 0;
    background: transparent;
    padding: 0.2rem 0.1rem;
    color: rgb(15 23 42);
    box-shadow: none;
    overflow: hidden;
  }

  .booking-event-dot {
    flex: 0 0 auto;
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 999px;
    background: rgb(14 165 233);
  }

  .booking-event-text {
    min-width: 0;
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    overflow: hidden;
  }

  .booking-event-ref {
    flex: 0 0 auto;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgb(3 105 161);
  }

  .booking-event-name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.76rem;
    font-weight: 700;
    color: rgb(15 23 42);
  }

  @media (max-width: 767px) {
    #booking-calendar .fc-daygrid-day-frame {
      min-height: 6.5rem;
    }
  }
</style>

<script id="booking-events-data" type="application/json">
[
  {% for b in bookings %}
    {
      "id": {{ b.id|tojson }},
      "title": {{ ("Ref #" ~ b.id ~ " - " ~ (b.full_name or "Unknown customer"))|tojson }},
      "start": {{ (b.start_date|string)|tojson }},
      "end": {{ ((b.end_date_plus_one|string) if b.end_date_plus_one is defined else (b.end_date|string))|tojson }},
      "url": {{ url_for('routes.booking_detail', booking_id=b.id)|tojson }},
      "extendedProps": {
        "status": {{ b.status|tojson }},
        "customer": {{ (b.full_name or "")|tojson }},
        "email": {{ (b.email or "")|tojson }},
        "total_cost": {{ b.total_cost|tojson }},
        "tent_summary": {{ (b.tent_summary or "No tent")|tojson }},
        "include_delivery": {{ b.include_delivery|tojson }},
        "include_setup_service": {{ b.include_setup_service|tojson }}
      }
    }{% if not loop.last %},{% endif %}
  {% endfor %}
]
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const calendarEl = document.getElementById("booking-calendar");
    const eventsDataEl = document.getElementById("booking-events-data");
    const popupEl = document.getElementById("calendar-booking-popup");
    const popupRefEl = document.getElementById("calendar-popup-ref");
    const popupTitleEl = document.getElementById("calendar-popup-title");
    const popupStatusEl = document.getElementById("calendar-popup-status");
    const popupPriceEl = document.getElementById("calendar-popup-price");
    const popupTentEl = document.getElementById("calendar-popup-tent");
    const popupExtrasEl = document.getElementById("calendar-popup-extras");
    const popupOpenEl = document.getElementById("calendar-popup-open");
    const events = JSON.parse(eventsDataEl.textContent);

    const closePopup = () => {
      popupEl.classList.add("hidden");
    };

    const openPopup = (event) => {
      const props = event.extendedProps;
      const extras = [];
      if (props.include_setup_service) extras.push("Setup");
      if (props.include_delivery) extras.push("Delivery");

      popupRefEl.textContent = `Booking #${event.id}`;
      popupTitleEl.textContent = props.customer || "Unknown customer";

      const statusClass = "inline-flex rounded-full bg-sky-100 px-3 py-1 text-xs font-medium text-sky-800";
      popupStatusEl.innerHTML = `<span class="${statusClass}">${props.status}</span>`;

      popupPriceEl.textContent = `${props.total_cost} kr`;
      popupTentEl.textContent = props.tent_summary || "No tent";
      popupExtrasEl.textContent = extras.length ? extras.join(" - ") : "No extras";
      popupOpenEl.href = event.url || "#";

      popupEl.classList.remove("hidden");
    };

    popupEl.querySelectorAll("[data-popup-close]").forEach((el) => {
      el.addEventListener("click", closePopup);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closePopup();
      }
    });

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: "dayGridMonth",
      height: "auto",
      firstDay: 1,
      navLinks: true,
      editable: false,
      selectable: false,
      dayMaxEvents: true,
      headerToolbar: {
        left: "prev,next today",
        center: "title",
        right: "dayGridMonth,timeGridWeek,listMonth"
      },
      events: events,
      eventContent: function(arg) {
        const props = arg.event.extendedProps;
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "booking-event-chip";
        chip.dataset.status = props.status || "pending";

        const dot = document.createElement("span");
        dot.className = "booking-event-dot";
        chip.appendChild(dot);

        const textWrap = document.createElement("div");
        textWrap.className = "booking-event-text";

        const ref = document.createElement("span");
        ref.className = "booking-event-ref";
        ref.textContent = `#${arg.event.id}`;
        textWrap.appendChild(ref);

        const name = document.createElement("span");
        name.className = "booking-event-name";
        name.textContent = props.customer || "Unknown customer";
        textWrap.appendChild(name);

        chip.appendChild(textWrap);
        chip.addEventListener("click", () => openPopup(arg.event));

        return { domNodes: [chip] };
      },
      eventClick: function(info) {
        info.jsEvent.preventDefault();
      },
      eventDidMount: function(info) {
        const status = info.event.extendedProps.status;
        const customer = info.event.extendedProps.customer;
        const email = info.event.extendedProps.email;

        info.el.title =
          `Booking #${info.event.id}\n` +
          `Customer: ${customer}\n` +
          `Email: ${email}\n` +
          `Status: ${status}`;
      }
    });

    calendar.render();
  });
</script>
{% endblock %}
