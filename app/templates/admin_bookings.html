{% extends "base.html" %}
{% block content %}
<div class="bg-white border rounded-xl p-6 shadow-sm">
  <h1 class="text-xl font-semibold">All bookings</h1>

  <div class="overflow-x-auto border rounded-lg mt-4">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-50 text-slate-600">
        <tr>
          <th class="p-3 text-left">Booking</th>
          <th class="p-3 text-left">Customer</th>
          <th class="p-3 text-left">Dates</th>
          <th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Created</th>
        </tr>
      </thead>
      <tbody>
        {% for b in bookings %}
          <tr class="border-t hover:bg-slate-50">
            <td class="p-3 font-medium text-indigo-700">
              <a class="block w-full h-full"
                 href="{{ url_for('routes.booking_detail', booking_id=b.id) }}">
                #{{ b.id }}
              </a>
            </td>
            <td class="p-3">
              <a class="block w-full h-full"
                 href="{{ url_for('routes.booking_detail', booking_id=b.id) }}">
                <div class="font-medium">{{ b.full_name }}</div>
                <div class="text-xs text-slate-500">{{ b.email }}</div>
              </a>
            </td>
            <td class="p-3">
              <a class="block w-full h-full"
                 href="{{ url_for('routes.booking_detail', booking_id=b.id) }}">
                {{ b.start_date }} → {{ b.end_date }}
              </a>
            </td>
            <td class="p-3">
              <a class="block w-full h-full"
                 href="{{ url_for('routes.booking_detail', booking_id=b.id) }}">
                {{ b.status }}
              </a>
            </td>
            <td class="p-3 text-xs text-slate-500">
              <a class="block w-full h-full"
                 href="{{ url_for('routes.booking_detail', booking_id=b.id) }}">
                {{ b.created_at }}
              </a>
            </td>
          </tr>
        {% else %}
          <tr><td class="p-3" colspan="5"><i>No bookings yet.</i></td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
