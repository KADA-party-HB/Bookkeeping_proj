{% extends "base.html" %}
{% block content %}
<div class="max-w-md bg-white border rounded-xl p-6 shadow-sm">
  <h1 class="text-xl font-semibold">Create account</h1>
  <p class="text-sm text-slate-500 mt-1">
    Register as a customer and create your customer profile.
  </p>

  <form method="post" class="mt-4 space-y-3">
    <div>
      <label class="text-sm font-medium" for="full_name">Full name</label>
      <input
        id="full_name"
        name="full_name"
        required
        class="mt-1 w-full rounded-lg border px-3 py-2"
      >
    </div>

    <div>
      <label class="text-sm font-medium" for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        required
        class="mt-1 w-full rounded-lg border px-3 py-2"
      >
    </div>

    <div>
      <label class="text-sm font-medium" for="phone">Phone (optional)</label>
      <input
        id="phone"
        name="phone"
        class="mt-1 w-full rounded-lg border px-3 py-2"
      >
    </div>

    <div>
      <label class="text-sm font-medium" for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        required
        class="mt-1 w-full rounded-lg border px-3 py-2"
      >
    </div>

    <button class="w-full rounded-lg bg-indigo-600 text-white py-2 hover:bg-indigo-700">
      Create account
    </button>
  </form>
</div>
{% endblock %}
