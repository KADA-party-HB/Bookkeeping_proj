{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-3xl">
  <div class="relative overflow-hidden rounded-[2rem] border border-sky-100 bg-gradient-to-br from-white via-sky-50 to-slate-50 shadow-sm">
    <div class="absolute inset-y-0 right-0 hidden w-1/3 bg-[radial-gradient(circle_at_top,rgba(14,165,233,0.16),transparent_58%)] lg:block"></div>
    <div class="relative px-6 py-8 md:px-8">
      <div class="inline-flex items-center gap-2 rounded-full border border-sky-200 bg-white/80 px-3 py-1 text-xs font-medium uppercase tracking-[0.2em] text-sky-700">
        Customer Desk
      </div>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-900">New customer</h1>
      <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-600">
        Create a customer profile without a login account so it can be used directly in bookings.
      </p>
    </div>
  </div>

  <div class="mt-6 rounded-[2rem] border border-slate-200 bg-white shadow-sm">
    <form method="post" class="grid gap-6 px-6 py-6 md:px-8">
      <div>
        <label class="text-sm font-medium text-slate-700" for="full_name">Full name</label>
        <input id="full_name" name="full_name" required class="mt-1 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 shadow-sm transition focus:border-sky-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100">
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="text-sm font-medium text-slate-700" for="email">Email</label>
          <input id="email" name="email" type="email" class="mt-1 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 shadow-sm transition focus:border-sky-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700" for="phone">Phone</label>
          <input id="phone" name="phone" class="mt-1 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 shadow-sm transition focus:border-sky-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100">
        </div>
      </div>

      <div class="grid gap-4 md:grid-cols-[2fr_1fr]">
        <div>
          <label class="text-sm font-medium text-slate-700" for="address">Address</label>
          <textarea id="address" name="address" rows="4" class="mt-1 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 shadow-sm transition focus:border-sky-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100"></textarea>
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700" for="postal_city">Postal city</label>
          <input id="postal_city" name="postal_city" class="mt-1 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 shadow-sm transition focus:border-sky-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100">
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <button class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-5 py-3 text-sm font-medium text-white transition hover:bg-sky-700">
          Create customer
        </button>
        <a class="inline-flex items-center justify-center rounded-2xl border border-slate-300 px-5 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50" href="{{ url_for('routes.customers') }}">
          Cancel
        </a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
