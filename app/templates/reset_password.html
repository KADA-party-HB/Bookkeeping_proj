{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-5xl">
  <div class="grid gap-6 lg:grid-cols-[1.05fr_0.95fr]">
    <div class="relative overflow-hidden rounded-[2rem] border border-sky-200 bg-[linear-gradient(135deg,#eff6ff_0%,#f8fbff_38%,#ffffff_100%)] shadow-[0_28px_70px_-42px_rgba(59,130,246,0.22)]">
      <div class="absolute -left-10 top-0 h-36 w-36 rounded-full bg-sky-300/35 blur-3xl"></div>
      <div class="absolute right-6 top-6 h-28 w-28 rounded-full bg-emerald-200/25 blur-3xl"></div>
      <div class="relative px-6 py-8 md:px-8">
        <div class="inline-flex items-center gap-2 rounded-full border border-sky-200 bg-white/90 px-3 py-1 text-xs font-medium uppercase tracking-[0.2em] text-sky-700">
          Nytt l&ouml;senord
        </div>
        <h1 class="mt-5 text-3xl font-black tracking-tight text-slate-950 md:text-5xl">&Aring;terst&auml;ll l&ouml;senord</h1>
        <p class="mt-3 max-w-xl text-sm leading-6 text-slate-700 md:text-base">
          Du uppdaterar nu l&ouml;senordet f&ouml;r <span class="font-semibold text-slate-900">{{ email }}</span>. V&auml;lj ett nytt l&ouml;senord och bekr&auml;fta det innan du forts&auml;tter.
        </p>
      </div>
    </div>

    <div class="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-[0_24px_60px_-42px_rgba(15,23,42,0.16)] md:p-8">
      <form method="post" class="space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-700" for="password">Nytt l&ouml;senord</label>
          <input id="password" name="password" type="password" required autocomplete="new-password" class="mt-1 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 shadow-sm transition focus:border-pink-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-pink-100">
        </div>

        <div>
          <label class="text-sm font-medium text-slate-700" for="password_confirm">Bekr&auml;fta l&ouml;senord</label>
          <input id="password_confirm" name="password_confirm" type="password" required autocomplete="new-password" class="mt-1 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 shadow-sm transition focus:border-pink-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-pink-100">
        </div>

        <button class="inline-flex w-full items-center justify-center rounded-2xl bg-pink-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-rose-600">
          Spara nytt l&ouml;senord
        </button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
