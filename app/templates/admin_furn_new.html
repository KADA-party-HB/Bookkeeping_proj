{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl bg-white border rounded-xl p-6 shadow-sm">
  <h2 class="text-xl font-semibold">Add furnishing item</h2>

  <form method="post" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="md:col-span-2">
      <h3 class="font-medium">Base item</h3>
    </div>

    <div>
      <label class="text-sm font-medium">SKU</label>
      <input name="sku" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Display name</label>
      <input name="display_name" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Daily rate</label>
      <input name="daily_rate" type="number" step="0.01" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div class="md:col-span-2 mt-2">
      <h3 class="font-medium">Furnishing details</h3>
    </div>

    <div>
      <label class="text-sm font-medium">Kind</label>
      <input name="furnishing_kind" required class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div>
      <label class="text-sm font-medium">Weight (kg) (optional)</label>
      <input name="weight_kg" type="number" step="0.01" min="0" class="mt-1 w-full rounded-lg border px-3 py-2">
    </div>

    <div class="md:col-span-2">
      <label class="text-sm font-medium">Notes (optional)</label>
      <textarea name="notes" rows="3" class="mt-1 w-full rounded-lg border px-3 py-2"></textarea>
    </div>

    <div class="md:col-span-2">
      <button class="rounded-lg bg-indigo-600 text-white px-4 py-2 hover:bg-indigo-700">
        Create
      </button>
    </div>
  </form>
</div>
{% endblock %}
