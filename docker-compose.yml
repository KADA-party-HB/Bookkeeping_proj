services:
  bookingservice:
    build:
      context: .
    container_name: dv1703-bookingservice
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-0}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-1}
      PORT: 8080
    ports:
      - "8080:8080"
