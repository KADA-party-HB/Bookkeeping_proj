<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="980" viewBox="0 0 1720 980" role="img" aria-labelledby="title desc">
  <title id="title">Kada database diagram</title>
  <desc id="desc">Entity relationship diagram for the tent rental application database.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .table { fill: #ffffff; stroke: #d7dce5; stroke-width: 2; }
      .header { fill: #245b8a; }
      .header-text { fill: #ffffff; font: 700 18px 'Segoe UI', Arial, sans-serif; }
      .body-text { fill: #25364a; font: 14px 'Consolas', 'Courier New', monospace; }
      .muted { fill: #697a90; font: 13px 'Consolas', 'Courier New', monospace; }
      .key { font-weight: 700; }
      .line { fill: none; stroke: #8d99ab; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .note { fill: #203247; font: 600 15px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1720" height="980" rx="24"/>

  <path class="line" d="M 250 180 L 300 180 L 300 110"/>
  <path class="line" d="M 320 380 L 380 380 L 380 470"/>
  <path class="line" d="M 320 390 L 380 390 L 380 680"/>
