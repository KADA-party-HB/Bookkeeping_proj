  <path class="line" d="M 1080 375 L 730 375 L 730 715"/>
  <path class="line" d="M 1330 625 L 1380 625 L 1380 330 L 1410 330"/>
  <path class="line" d="M 1200 540 L 1200 405 L 1410 405"/>
  <path class="line" d="M 1260 540 L 1260 425 L 730 425 L 730 715"/>

